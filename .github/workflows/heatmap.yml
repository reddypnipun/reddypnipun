name: Update CF Heatmap

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install libs
        run: pip install matplotlib numpy requests

      - name: Generate heatmap
        run: python cf_heatmap.py

      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add cf_heatmap.png
          git commit -m "update heatmap" || exit 0
          git push
